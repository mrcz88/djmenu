{% extends "menu/base.html" %}
{% block content %}

<h2>Profile</h2>
<p>Username: {{user.username}}</p>
<p>Email: {{user.email}}</p>
{% if user.profile %}
    <img class="w-[50px] h-[50px] rounded-full object-cover" src="{{ user.profile.image.url }}" alt="Profile Picture">
    <p>Location: {{user.profile.location}}</p>
{% endif %}
{% endblock %}
