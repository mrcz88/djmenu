{% extends 'menu/base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-semibold mb-4">Prodotti</h1>

    <ul class="space-y-3">
        {% for item in items %}
        <li class="flex items-center gap-3 p-3 border rounded">
            <img
                src="{{ item.item_image }}"
                alt="{{ item.item_name }}"
                class="w-32 h-32 object-cover rounded bg-gray-100"
            >

            <div class="flex-1">
                <a class="font-medium hover:underline" href="{% url 'menu:item_detail' item.id %}">
                    {{ item.item_name }}
                </a>
            </div>

            <a
                class="text-sm px-2 py-1 border rounded hover:bg-gray-50"
                href="{% url 'menu:update_item' item.id %}"
            >
                edit
            </a>
            <a
                class="text-sm px-2 py-1 border rounded hover:bg-gray-50"
                href="{% url 'menu:delete_item_with_confirm' item.id %}"
            >
                delete
            </a>
        </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
